version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: kairos_db
    environment:
      POSTGRES_USER: kairos_user
      POSTGRES_PASSWORD: kairos_password
      POSTGRES_DB: kairos_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kairos_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: kairos_backend
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://kairos_user:kairos_password@db:5432/kairos_db

  frontend:
    build: ./frontend
    container_name: kairos_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000

volumes:
  postgres_data:
